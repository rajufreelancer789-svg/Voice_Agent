<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agentic Loan Dashboard</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        background: #f6f7fb;
        color: #1e2330;
      }
      .container {
        max-width: 1200px;
        margin: 24px auto;
        padding: 0 16px;
      }
      .card {
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 1px 2px rgba(16, 24, 40, 0.08);
        padding: 16px;
        margin-bottom: 16px;
      }
      h1 { margin: 0 0 12px; font-size: 22px; }
      table { width: 100%; border-collapse: collapse; }
      th, td {
        padding: 10px 8px;
        border-bottom: 1px solid #eceef4;
        text-align: left;
        font-size: 14px;
      }
      th { font-weight: 600; color: #4e5773; }
      button {
        background: #155eef;
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 8px 10px;
        cursor: pointer;
      }
      button:disabled { opacity: 0.6; cursor: not-allowed; }
      .status {
        display: inline-block;
        padding: 4px 8px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 600;
      }
      .status.pending { background: #fff3d6; color: #9a6700; }
      .status.paid { background: #dcfae6; color: #067647; }
      #message { font-size: 14px; margin: 8px 0; }
      .muted { color: #667085; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card">
        <h1>Loan Recovery Dashboard</h1>
        <div id="message" class="muted">Loading data...</div>
        <table>
          <thead>
            <tr>
              <th>Customer</th>
              <th>Phone</th>
              <th>Loan ID</th>
              <th>Loan Number</th>
              <th>EMI Amount</th>
              <th>EMI Status</th>
              <th>Due Date</th>
              <th>Call</th>
            </tr>
          </thead>
          <tbody id="loans-body"></tbody>
        </table>
      </div>

      <div class="card">
        <h1>Recent Calls</h1>
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Customer</th>
              <th>Loan Number</th>
              <th>Status</th>
              <th>Dispatch ID</th>
              <th>Provider</th>
              <th>Time</th>
            </tr>
          </thead>
          <tbody id="calls-body"></tbody>
        </table>
      </div>
    </div>

    <script>
      const messageEl = document.getElementById('message');
      const loansBody = document.getElementById('loans-body');
      const callsBody = document.getElementById('calls-body');

      function setMessage(text, isError = false) {
        messageEl.textContent = text;
        messageEl.style.color = isError ? '#b42318' : '#667085';
      }

      function rowStatusBadge(status) {
        const normalized = String(status || '').toLowerCase();
        const css = normalized === 'paid' ? 'paid' : 'pending';
        return `<span class="status ${css}">${status}</span>`;
      }

      async function loadLoans() {
        const response = await fetch('/api/dashboard/loans');
        if (!response.ok) throw new Error('Failed to load loans');
        return response.json();
      }

      async function loadCalls() {
        const response = await fetch('/api/calls');
        if (!response.ok) throw new Error('Failed to load calls');
        return response.json();
      }

      async function triggerCall(loanId, buttonEl) {
        buttonEl.disabled = true;
        setMessage('Triggering call...');
        try {
          const response = await fetch(`/api/loans/${loanId}/call`, { method: 'POST' });
          const data = await response.json();
          if (!response.ok) throw new Error(data?.detail?.message || data?.detail || 'Call failed');
          setMessage(`Call initiated. Dispatch: ${data.dispatch_id}`);
          await renderCalls();
        } catch (error) {
          setMessage(error.message, true);
        } finally {
          buttonEl.disabled = false;
        }
      }

      async function renderLoans() {
        const loans = await loadLoans();
        loansBody.innerHTML = '';
        for (const loan of loans) {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${loan.customer_name}</td>
            <td>${loan.phone_number}</td>
            <td>${loan.loan_id}</td>
            <td>${loan.loan_number}</td>
            <td>₹${Math.round(loan.emi_amount)}</td>
            <td>${rowStatusBadge(loan.emi_status)}</td>
            <td>${loan.due_date}</td>
            <td><button data-loan-id="${loan.loan_id}">Call</button></td>
          `;
          loansBody.appendChild(tr);
        }

        document.querySelectorAll('button[data-loan-id]').forEach((button) => {
          button.addEventListener('click', () => triggerCall(button.dataset.loanId, button));
        });
      }

      async function renderCalls() {
        const calls = await loadCalls();
        callsBody.innerHTML = '';
        for (const call of calls) {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${call.id}</td>
            <td>${call.customer_name}</td>
            <td>${call.loan_number}</td>
            <td>${call.status}</td>
            <td>${call.dispatch_id || '-'}</td>
            <td>${call.provider_code || '-'}</td>
            <td>${new Date(call.created_at).toLocaleString()}</td>
          `;
          callsBody.appendChild(tr);
        }
      }

      async function bootstrap() {
        try {
          await renderLoans();
          await renderCalls();
          setMessage('Ready');
        } catch (error) {
          setMessage(error.message, true);
        }
      }

      bootstrap();
    </script>
  </body>
</html>
